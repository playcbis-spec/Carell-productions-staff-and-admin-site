<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carell Productions™ Staff Portal</title>
    <style>
        /* Modern App Styling Themes */
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #121215;
            --card-sub: #18181c;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #6366f1;
            --accent-dim: rgba(99, 102, 241, 0.15);
            --border: #222226;
            --danger: #f43f5e;
            --success: #10b981;
            --nav-bg: #111115;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f7;
            --card-bg: #ffffff;
            --card-sub: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --accent: #4f46e5;
            --accent-dim: rgba(79, 70, 229, 0.1);
            --border: #e5e7eb;
            --danger: #e11d48;
            --success: #059669;
            --nav-bg: #e2e8f0;
        }

        [data-theme="glass"] {
            --bg-color: #0d1117;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-sub: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --accent: #0071e3;
            --accent-dim: rgba(0, 113, 227, 0.2);
            --border: rgba(255, 255, 255, 0.12);
            --danger: #ff453a;
            --success: #30d158;
            --nav-bg: rgba(255, 255, 255, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; transition: background 0.3s ease; }
        .container { width: 100%; max-width: 850px; background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; min-height: 500px; }
        
        .login-box { padding: 60px 20px; max-width: 360px; margin: auto; text-align: center; }
        input { width: 100%; padding: 12px; margin: 6px 0; background-color: var(--card-sub); border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; }
        button { width: 100%; padding: 12px; background-color: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 6px; }
        .error-msg { color: var(--danger); margin-top: 10px; font-size: 13px; display: none; }
        .view-content { padding: 30px; display: none; }
        .view-content.active { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginScreen" class="login-box">
            <h2>Sign In</h2>
            <input type="text" id="username" placeholder="Username" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">Sign In</button>
            <div id="errorMsg" class="error-msg">Invalid username or password</div>
        </div>

        <div id="dashboardScreen" style="display: none; flex-grow: 1;">
            <div id="homeView" class="view-content active">
                <h2 id="welcomeText">Welcome</h2>
                <p id="roleText">Staff Member</p>
                <button onclick="handleLogout()" style="background: var(--danger); width: auto; margin-top: 20px;">Log Out</button>
            </div>
        </div>
    </div>

    <script>
        // Updated Account List
        function getAccounts() {
            return {
                "AA": { 
                    name: "Alia", 
                    pass: "Alia7778881028", 
                    role: "Assistant Executive Producer" 
                },
                "Cannon": { 
                    name: "Cannon", 
                    pass: "CB Canon 777-888-1127", 
                    role: "Company Owner & Director" 
                },
                "Luther Bailey": {
                    name: "Luther Bailey",
                    pass: "LB77128",
                    role: "Staff Member"
                }
            };
        }

        function handleLogin() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value;
            const accounts = getAccounts();

            if (accounts[userIn] && accounts[userIn].pass === passIn) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
                document.getElementById('welcomeText').innerText = "Welcome, " + accounts[userIn].name;
                document.getElementById('roleText').innerText = "Role: " + accounts[userIn].role;
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function handleLogout() {
            location.reload();
        }

        document.addEventListener("keypress", function(event) {
            if (event.key === "Enter") handleLogin();
        });
    </script>
</body>
</html>
