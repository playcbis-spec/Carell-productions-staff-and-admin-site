<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carell Productions™ | Staff Portal</title>
    <style>
        :root {
            --bg: #09090b;
            --surface: #141419;
            --accent: #6366f1;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #2e2e38;
        }

        body { background-color: var(--bg); color: var(--text-main); font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: var(--surface); padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        
        /* Time Clock Styles */
        .clock-box { text-align: center; margin-bottom: 30px; }
        .timer-display { font-size: 48px; font-weight: 800; margin-bottom: 20px; font-family: monospace; }
        
        button { 
            background: var(--accent); color: white; border: none; padding: 12px 24px; 
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }

        /* Progress Bar Styles */
        .progress-container { margin-top: 30px; }
        .progress-bar-bg { background: var(--border); height: 20px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.5s; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Staff Time Clock</h2>
        <div class="clock-box">
            <div class="timer-display" id="display">00:00:00</div>
            <button onclick="toggleClock()" id="clockBtn">Start Shift</button>
        </div>

        <div class="progress-container">
            <h3>Profit Progress ($100 Goal)</h3>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <p id="progressText" style="margin-top: 10px; color: var(--text-muted);">Current: $0</p>
        </div>
    </div>

    <script>
        let isRunning = false;
        let startTime;

        function toggleClock() {
            const btn = document.getElementById('clockBtn');
            isRunning = !isRunning;
            btn.innerText = isRunning ? "Clock Out" : "Start Shift";
        }

        // Dummy Profit Updater for testing
        function updateProfit(amount) {
            const bar = document.getElementById('progressBar');
            const percent = (amount / 100) * 100;
            bar.style.width = percent + "%";
            document.getElementById('progressText').innerText = "Current: $" + amount;
        }

        // Example: Update profit to 25 to show it moving
        updateProfit(25);
    </script>
</body>
</html>
